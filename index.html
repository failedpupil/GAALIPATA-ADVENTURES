<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover the best travel destinations in Karnataka with Gaalipata Adventures. Find beaches, hill stations, heritage sites, wildlife reserves and more.">
    <meta name="keywords" content="Gaalipata Adventures, Karnataka travel, Karnataka tourism, travel recommendations, Karnataka map">
    <meta name="author" content="Gaalipata Adventures">
    <title>Gaalipata Adventures — Discover the Best of Karnataka</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
</head>
<body>

    <!-- ================ LANDING OVERLAY ================ -->
    <div id="landing-overlay" class="landing-overlay">
        <div class="landing-card">
            <div class="landing-logo">🗺️</div>
            <h1 class="landing-title">GAALIPATA <span>ADVENTURES</span></h1>
            <p class="landing-subtitle">Discover the hidden gems of Karnataka</p>
            
            <div class="landing-options">
                <button class="landing-btn" onclick="enterApp('plans')">
                    <span class="l-icon">📋</span>
                    <div class="l-text">
                        <strong>Gaalipata Plans</strong>
                        <small>Curated Map Itineraries</small>
                    </div>
                </button>
                
                <button class="landing-btn primary" onclick="enterApp('explore')">
                    <span class="l-icon">🧭</span>
                    <div class="l-text">
                        <strong>Explore Karnataka</strong>
                        <small>Interactive Map & Filters</small>
                    </div>
                </button>
                
                <button class="landing-btn" onclick="enterApp('admin')">
                    <span class="l-icon">⚙️</span>
                    <div class="l-text">
                        <strong>Admin Portal</strong>
                        <small>Manage Locations & Plans</small>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- Animated Background -->
    <div class="bg-animation" aria-hidden="true"></div>

    <!-- ================ NAVBAR ================ -->
    <nav class="navbar" id="main-navbar">
        <a href="#" class="navbar-brand" onclick="event.preventDefault()">
            <div class="logo-icon">🗺️</div>
            <div>
                <div class="brand-text">GAALIPATA</div>
                <div class="brand-sub">ADVENTURES</div>
            </div>
        </a>
        <ul class="navbar-nav">
            <li>
                <button class="nav-btn" data-view="plans" onclick="switchView('plans')" id="nav-plans">
                    <span class="icon">📋</span>
                    <span>Gaalipata Plans</span>
                </button>
            </li>
            <li>
                <button class="nav-btn active" data-view="explore" onclick="switchView('explore')" id="nav-explore">
                    <span class="icon">🧭</span>
                    <span>Explore</span>
                </button>
            </li>
            <li>
                <button class="nav-btn" data-view="admin" onclick="switchView('admin')" id="nav-admin">
                    <span class="icon">⚙️</span>
                    <span>Admin</span>
                </button>
            </li>
            <li class="nav-separator"></li>
            <li class="settings-wrapper">
                <button class="nav-btn settings-btn" onclick="toggleSettingsMenu(event)" id="nav-settings" title="Settings">
                    <span class="dots-icon">⋮</span>
                </button>
                <div class="settings-dropdown" id="settings-dropdown">
                    <button class="settings-item" onclick="resetData(); closeSettingsMenu();">
                        <span>↺</span> Reset Data
                    </button>
                    <button class="settings-item" onclick="toggleThemeMode(); closeSettingsMenu();">
                        <span>🌙</span> <span id="theme-label">Dark Mode</span>
                    </button>
                    <hr class="settings-divider">
                    <button class="settings-item" onclick="showAbout(); closeSettingsMenu();">
                        <span>ℹ️</span> About
                    </button>
                </div>
            </li>
        </ul>
    </nav>

    <!-- ================ MAIN LAYOUT ================ -->
    <main class="app-layout">

        <!-- -------- SIDEBAR -------- -->
        <aside class="sidebar" id="sidebar">
            <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar" id="sidebar-toggle-btn">
                ◀
            </button>

            <!-- Plans Panel -->
            <div class="sidebar-panel" id="plans-panel">
                <!-- Populated by app.js -->
            </div>

            <!-- Explore Panel -->
            <div class="sidebar-panel active" id="explore-panel">
                <!-- Populated by form.js -->
            </div>

            <!-- Admin Panel -->
            <div class="sidebar-panel" id="admin-panel">
                <!-- Populated by admin.js -->
            </div>
        </aside>

        <!-- -------- MAP AREA -------- -->
        <section class="map-container" id="map-section">
            <!-- Leaflet Map -->
            <div id="map"></div>

            <!-- Map info badge -->
            <div class="map-info-badge">
                <span class="dot"></span>
                <span id="map-location-count">Loading...</span>
            </div>

            <!-- Click mode indicator -->
            <div class="map-click-mode" id="click-mode-indicator">
                📌 Click on the map to place a marker
            </div>

            <!-- Map Legend -->
            <div class="map-legend" id="map-legend">
                <!-- Populated by map.js -->
            </div>

            <!-- Bottom Recommendation Bar -->
            <div class="recommendations-bar">
                <div class="reco-scroll" id="reco-scroll">
                    <!-- Populated by map.js -->
                </div>
            </div>
        </section>

    </main>

    <!-- ================ ADMIN FORM MODAL ================ -->
    <div class="admin-form-overlay" id="admin-form-overlay">
        <!-- Populated by admin.js -->
    </div>

    <!-- ================ TOAST CONTAINER ================ -->
    <div class="toast-container" id="toast-container"></div>

    <!-- ================ SCRIPTS ================ -->
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>

    <!-- App Scripts (order matters) -->
    <script src="js/data.js"></script>
    <script src="js/map.js"></script>
    <script src="js/form.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
